# .readthedocs.yml
# "Read the Docs" doc-hosting website configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required (for this file format)
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # Fetch the latest perftest summary from the perftest-results
    # branch (regenerated by the "Run perftests" workflow) so that
    # master never receives bot commits with figures. ``|| true`` keeps
    # the in-tree placeholder if the fetch fails.
    pre_build:
      - curl -fsSL https://raw.githubusercontent.com/flatironinstitute/finufft/perftest-results/docs/performance_change_summary.rst -o docs/performance_change_summary.rst || true

# Build all formats
formats: all

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Optionally set the version of Python and requirements required to build your docs
python:
  install:
    - requirements: docs/requirements.txt
