name: Run perftests

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: perftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perftest:
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: "fftw"
            ducc_enabled: "OFF"
          - name: "ducc"
            ducc_enabled: "ON"
    env:
      VERSIONS_INPUT: v2.2.0 v2.3.1 v2.4.1 v2.5.1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest perftest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Cpp
        uses: aminya/setup-cpp@1f17f92d6a52bfcb1a25348e2c526c2e5cbb1134 # v1.8.0
        with:
          cmake: true
          ninja: true

      - name: Checkout tagged versions
        run: |
          mkdir -p ../builds
          rm -fr ../builds/*
          tags="$VERSIONS_INPUT master"
          for tag in $tags; do
            if [ "$tag" = "master" ]; then
              src_path="."
            else
              rm -fr ../$tag
              git worktree add -f -d ../$tag tags/$tag
              rm -fr ../$tag/perftest
              cp -r perftest ../$tag/perftest
              src_path="../$tag"
            fi
            cmake -B ../builds/$tag -S $src_path \
              -DFINUFFT_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release \
              -DFINUFFT_USE_DUCC0=${{ matrix.target.ducc_enabled }}
            cmake --build ../builds/$tag --target perftest -j
          done

      - name: Install plotting dependency
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - run: python3 -m pip install --quiet matplotlib pandas Jinja2 py-cpuinfo

      - name: Generate docs page
        run: |
          rm -fr outputs
          mkdir -p outputs
          python3 perftest/run_perftest_ci.py \
            --backend "${{ matrix.target.name }}" \
            --builds-root ../builds \
            --tag-list "$VERSIONS_INPUT master" \
            --cmake-cache-from master \
            --page-template docs/performance_backend.rst.j2 \
            --output outputs

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perftest-result-${{ matrix.target.name }}
          path: ./outputs/

  gather-matrix-results:
    needs: perftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: perftest-result-*
          path: ./outputs/
          merge-multiple: true

      - name: Assemble combined performance_change_summary.rst
        run: |
          rm -fr docs/pics/perftestci_*
          mv outputs/*.png docs/pics/
          python3 - <<'PY'
          from pathlib import Path

          page = Path("docs/performance_change_summary.rst")
          marker = ".. PERFTEST_BACKENDS_BELOW"
          intro, _, _ = page.read_text(encoding="utf-8").partition(marker)
          # Preserve the marker so subsequent runs can locate it again.
          chunks = [intro.rstrip() + "\n\n" + marker + "\n"]
          # Order: FFTW first, then DUCC.
          for backend in ("fftw", "ducc"):
              snippet = Path(f"outputs/performance_{backend}.rst")
              if snippet.exists():
                  chunks.append("\n" + snippet.read_text(encoding="utf-8").strip() + "\n")
          page.write_text("\n".join(chunks) + "\n", encoding="utf-8")
          PY

      - name: Commit generated perftest docs to master
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pics/perftestci_* docs/performance_change_summary.rst
          if git diff --staged --quiet; then
            echo "No perftest doc changes to commit."
            exit 0
          fi
          # The "[no ci]" token tells GitHub Actions to skip the
          # subsequent push event so we don't recursively retrigger.
          git commit -m "ci(perftest): regenerate performance_change_summary [no ci]"
          # Pull any commits that landed while we were running, then
          # fast-forward push. Concurrency cancels stale runs, so races
          # should be rare; if one slips through, the rebase keeps the
          # bot commit on top.
          git pull --rebase origin master
          git push origin HEAD:master
